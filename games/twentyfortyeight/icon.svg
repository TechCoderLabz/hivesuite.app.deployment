<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128">
  <rect x="2" y="2" width="60" height="60" rx="10" fill="#bbada0" stroke="#776e65" stroke-width="2"/>
  <!-- 4x4 grid -->
  <g>
    <rect x="6"  y="6"  width="12" height="12" rx="2" fill="#eee4da"/>
    <rect x="20" y="6"  width="12" height="12" rx="2" fill="#ede0c8"/>
    <rect x="34" y="6"  width="12" height="12" rx="2" fill="#f2b179"/>
    <rect x="48" y="6"  width="10" height="12" rx="2" fill="#f59563"/>
    <rect x="6"  y="20" width="12" height="12" rx="2" fill="rgba(0,0,0,0.06)"/>
    <rect x="20" y="20" width="12" height="12" rx="2" fill="#f67c5f"/>
    <rect x="34" y="20" width="12" height="12" rx="2" fill="#edcf72"/>
    <rect x="48" y="20" width="10" height="12" rx="2" fill="#edcc61"/>
    <rect x="6"  y="34" width="12" height="12" rx="2" fill="#edc850"/>
    <rect x="20" y="34" width="12" height="12" rx="2" fill="rgba(0,0,0,0.06)"/>
    <rect x="34" y="34" width="12" height="12" rx="2" fill="#edc53f"/>
    <rect x="48" y="34" width="10" height="12" rx="2" fill="#edc22e"/>
