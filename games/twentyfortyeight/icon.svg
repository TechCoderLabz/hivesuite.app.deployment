    <rect x="20" y="48" width="12" height="10" rx="2" fill="rgba(0,0,0,0.06)"/>
    <rect x="34" y="48" width="12" height="10" rx="2" fill="#edc22e"/>
    <rect x="48" y="48" width="10" height="10" rx="2" fill="#edc22e"/>
  </g>
  <!-- big 2048 label -->
  <text x="51" y="55" font-family="ui-monospace, monospace" font-size="6" font-weight="900" fill="#fff" text-anchor="middle">2048</text>
  <text x="40" y="44" font-family="ui-monospace, monospace" font-size="7" font-weight="900" fill="#fff" text-anchor="middle">512</text>
  <text x="40" y="30" font-family="ui-monospace, monospace" font-size="6" font-weight="900" fill="#fff" text-anchor="middle">128</text>
  <text x="12" y="16" font-family="ui-monospace, monospace" font-size="7" font-weight="900" fill="#776e65" text-anchor="middle">2</text>
  <text x="26" y="16" font-family="ui-monospace, monospace" font-size="7" font-weight="900" fill="#776e65" text-anchor="middle">4</text>
  <text x="40" y="16" font-family="ui-monospace, monospace" font-size="7" font-weight="900" fill="#fff" text-anchor="middle">8</text>
  <text x="53" y="16" font-family="ui-monospace, monospace" font-size="7" font-weight="900" fill="#fff" text-anchor="middle">16</text>
