<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128">
  <rect x="2" y="2" width="60" height="60" rx="10" fill="#04060e" stroke="#2e3a55" stroke-width="2"/>
  <!-- stars -->
  <g fill="rgba(255,255,255,0.6)">
    <rect x="10" y="10" width="1.5" height="1.5"/>
    <rect x="26" y="6" width="1.5" height="1.5"/>
    <rect x="48" y="14" width="1.5" height="1.5"/>
    <rect x="56" y="32" width="1.5" height="1.5"/>
    <rect x="14" y="36" width="1.5" height="1.5"/>
    <rect x="40" y="48" width="1.5" height="1.5"/>
  </g>
  <!-- asteroids (vector outlines) -->
  <g fill="none" stroke="#cdd8e8" stroke-width="1.4">
    <polygon points="14,16 19,12 24,15 26,21 22,25 16,24 12,20"/>
    <polygon points="46,12 50,9 54,12 56,17 53,21 48,21 44,17"/>
    <polygon points="48,42 53,40 57,44 56,50 51,52 46,49 46,45"/>
    <polygon points="10,44 14,42 18,45 17,49 13,51 9,48"/>
  </g>
  <!-- player ship -->
  <g stroke="#a8d8ff" stroke-width="1.8" fill="none">
    <polygon points="38,32 26,26 30,32 26,38" stroke-linejoin="round"/>
  </g>
  <!-- bullets -->
  <circle cx="42" cy="32" r="1.4" fill="#ffd166"/>
  <circle cx="46" cy="30" r="1.2" fill="#ffd166"/>
</svg>
