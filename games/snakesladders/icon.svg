<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a261a"/>
      <stop offset="100%" stop-color="#1a0e08"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c2772b"/>
      <stop offset="100%" stop-color="#7a4814"/>
    </linearGradient>
    <linearGradient id="snake" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5cb04a"/>
      <stop offset="100%" stop-color="#1d4f1f"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="10" fill="url(#bg)" stroke="#6b4222" stroke-width="2"/>
  <!-- ladder -->
  <line x1="14" y1="50" x2="22" y2="14" stroke="url(#rail)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="51" x2="28" y2="15" stroke="url(#rail)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="15.5" y1="44" x2="21.5" y2="44" stroke="#9c5e1e" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="16.5" y1="36" x2="22.5" y2="36" stroke="#9c5e1e" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="17.5" y1="28" x2="23.5" y2="28" stroke="#9c5e1e" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="18.5" y1="20" x2="24.5" y2="20" stroke="#9c5e1e" stroke-width="1.6" stroke-linecap="round"/>
  <!-- snake -->
  <path d="M 50 14 C 38 22, 56 32, 42 40 C 30 46, 50 52, 40 56" stroke="url(#snake)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="50" cy="14" r="3.5" fill="#3f8a3a" stroke="#1d4f1f" stroke-width="0.8"/>
  <circle cx="48.5" cy="13" r="0.9" fill="#fff"/>
  <circle cx="51.5" cy="13" r="0.9" fill="#fff"/>
  <circle cx="48.5" cy="13" r="0.4" fill="#000"/>
  <circle cx="51.5" cy="13" r="0.4" fill="#000"/>
  <!-- die in corner -->
  <rect x="40" y="44" width="14" height="14" rx="2.5" fill="#f4ecd8" stroke="#2a1810" stroke-width="1.4"/>
  <circle cx="44" cy="48" r="1.4" fill="#2a1810"/>
  <circle cx="50" cy="48" r="1.4" fill="#2a1810"/>
  <circle cx="44" cy="54" r="1.4" fill="#2a1810"/>
  <circle cx="50" cy="54" r="1.4" fill="#2a1810"/>
</svg>
