<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128">
  <defs>
    <linearGradient id="fpsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3aa1ff"/>
      <stop offset="100%" stop-color="#a3d8ff"/>
    </linearGradient>
    <linearGradient id="fpipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3aa14e"/>
      <stop offset="50%" stop-color="#7df096"/>
      <stop offset="100%" stop-color="#1f6e30"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="10" fill="url(#fpsky)" stroke="#1c5ea0" stroke-width="2"/>
  <!-- ground -->
  <rect x="2" y="50" width="60" height="12" fill="#deca7c"/>
  <rect x="2" y="50" width="60" height="2" fill="#5a3d10"/>
  <!-- left pipe (top + bottom) -->
  <rect x="14" y="6"  width="10" height="14" fill="url(#fpipe)" stroke="#1a4a1d" stroke-width="0.6"/>
  <rect x="13" y="20" width="12" height="4"  fill="url(#fpipe)" stroke="#1a4a1d" stroke-width="0.6"/>
  <rect x="13" y="36" width="12" height="4"  fill="url(#fpipe)" stroke="#1a4a1d" stroke-width="0.6"/>
  <rect x="14" y="40" width="10" height="10" fill="url(#fpipe)" stroke="#1a4a1d" stroke-width="0.6"/>
  <!-- right pipe -->
  <rect x="44" y="6"  width="10" height="22" fill="url(#fpipe)" stroke="#1a4a1d" stroke-width="0.6"/>
  <rect x="43" y="28" width="12" height="4"  fill="url(#fpipe)" stroke="#1a4a1d" stroke-width="0.6"/>
  <!-- bird -->
  <g>
    <circle cx="32" cy="32" r="9" fill="#ffd166" stroke="#5a3d10" stroke-width="1"/>
    <circle cx="30" cy="34" r="5.5" fill="#fff8e0"/>
    <!-- eye -->
    <circle cx="35" cy="29.5" r="2.4" fill="#fff"/>
    <circle cx="35.5" cy="29.5" r="1.1" fill="#0d0d0d"/>
    <!-- beak -->
    <polygon points="40,30 46,32 40,34" fill="#ff7a30" stroke="#5a3d10" stroke-width="0.6"/>
    <!-- wing -->
    <ellipse cx="29" cy="35" rx="5" ry="3" fill="#d99d2a" stroke="#5a3d10" stroke-width="0.5"/>
  </g>
</svg>
