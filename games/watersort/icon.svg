<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Tube 1 -->
  <g transform="translate(40 24)">
    <rect x="0" y="0" width="44" height="152" rx="8" ry="8" fill="url(#glass)" stroke="rgba(180,220,255,0.6)" stroke-width="2.5"/>
    <rect x="3" y="118" width="38" height="32" fill="#3b82f6"/>
    <rect x="3" y="86" width="38" height="32" fill="#22c55e"/>
    <rect x="3" y="54" width="38" height="32" fill="#ef4444"/>
    <rect x="3" y="22" width="38" height="32" fill="#facc15"/>
    <ellipse cx="10" cy="20" rx="4" ry="40" fill="#ffffff" opacity="0.18" filter="url(#glow)"/>
  </g>

  <!-- Tube 2 -->
  <g transform="translate(98 24)">
    <rect x="0" y="0" width="44" height="152" rx="8" ry="8" fill="url(#glass)" stroke="rgba(180,220,255,0.6)" stroke-width="2.5"/>
    <rect x="3" y="118" width="38" height="32" fill="#a855f7"/>
    <rect x="3" y="86" width="38" height="32" fill="#facc15"/>
    <rect x="3" y="54" width="38" height="32" fill="#22c55e"/>
    <ellipse cx="10" cy="20" rx="4" ry="40" fill="#ffffff" opacity="0.18" filter="url(#glow)"/>
  </g>

  <!-- Tube 3 -->
  <g transform="translate(156 24)">
    <rect x="0" y="0" width="44" height="152" rx="8" ry="8" fill="url(#glass)" stroke="rgba(180,220,255,0.6)" stroke-width="2.5"/>
    <rect x="3" y="118" width="38" height="32" fill="#ef4444"/>
    <rect x="3" y="86" width="38" height="32" fill="#3b82f6"/>
    <ellipse cx="10" cy="20" rx="4" ry="40" fill="#ffffff" opacity="0.18" filter="url(#glow)"/>
  </g>
</svg>
